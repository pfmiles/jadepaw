name: Security Audit

on:
  schedule:
    - cron: "0 8 * * 1"
  push:
    paths:
      - "**/Cargo.lock"

jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo-audit
        run: cargo audit